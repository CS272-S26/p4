<!DOCTYPE html>
<html>
<head>
  <title>Contact - Student Course Planner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Planner</a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="courses.html">Courses</a>
      <a class="text-white me-3" href="tasks.html">Tasks</a>
      <a class="text-white me-3" href="calendar.html">Calendar</a>
      <a class="text-white me-3" href="about.html">About</a>
      <a class="text-white me-3" href="contact.html">Contact</a>
      <a class="text-white me-3" href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h1>Contact</h1>
  <p>Use this form to send feedback about the Student Course Planner.</p>

  <div class="card p-3 mt-3">
    <form>
      <div class="mb-3">
        <label for="contact-name" class="form-label">Name</label>
        <input id="contact-name" type="text" class="form-control" placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label for="contact-email" class="form-label">Email</label>
        <input id="contact-email" type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label for="contact-message" class="form-label">Message</label>
        <textarea id="contact-message" class="form-control" rows="4" placeholder="Write your message"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>
</div>

</body>
</html>
