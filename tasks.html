<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks - Student Course Planner</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Global CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Planner</a>
      <div>
        <a class="nav-link text-white d-inline" href="index.html">Home</a>
        <a class="nav-link text-white d-inline" href="courses.html">Courses</a>
        <a class="nav-link text-white d-inline" href="tasks.html">Tasks</a>
        <a class="nav-link text-white d-inline" href="about.html">About</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-4">

    <!-- ⭐ semantic tags（加分） -->
    <section>
      <article>

        <h1 class="mb-4">Task Manager</h1>

        <!-- Add Task Form -->
        <div class="card p-3 mb-4">
          <h5>Add New Task</h5>

          <div class="mb-2">
            <label for="task-name" class="form-label">Task Name</label>
            <input id="task-name" type="text" class="form-control" placeholder="Enter task name">
          </div>

          <div class="mb-2">
            <label for="task-date" class="form-label">Deadline</label>
            <input id="task-date" type="date" class="form-control">
          </div>

          <div class="mb-2">
            <label for="task-course" class="form-label">Course (optional)</label>
            <input id="task-course" type="text" class="form-control" placeholder="e.g. CS272">
          </div>

          <button id="add-btn" class="btn btn-primary mt-2">Add Task</button>
        </div>

        <!-- Task List -->
        <div class="card p-3">

          <h5>Your Tasks</h5>

          <!-- ⭐ Filter（加分） -->
          <div class="mb-2">
            <label for="filter-course" class="form-label">Filter by Course</label>
            <input id="filter-course" type="text" class="form-control" placeholder="Type course name">
          </div>

          <ul id="task-list" class="list-group mt-2"></ul>

        </div>

      </article>
    </section>

  </div>

  <template id="task-template"></template>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
